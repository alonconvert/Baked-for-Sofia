<title>Baked for Sofia — AI Asset Prompt Generator</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--bg2:#111118;--bg3:#1a1a24;--bg4:#22222e;
  --gold:#c8956c;--gold-dim:#a87450;--gold-bright:#e0b08a;
  --text:#e8e4df;--text-dim:#8a8690;--text-muted:#5a5660;
  --border:#2a2a36;--border-light:#3a3a48;
  --red:#c26d6d;--green:#7dab8a;--blue:#7d9bc2;
}
html{font-size:15px;scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}

/* ---- HEADER ---- */
.header{text-align:center;padding:2.5rem 1.5rem 1.5rem;border-bottom:1px solid var(--border)}
.header h1{font-size:2rem;font-weight:700;letter-spacing:-.03em;color:var(--gold)}
.header h1 span{color:var(--text);font-weight:400}
.header p.sub{color:var(--text-dim);font-size:.85rem;margin-top:.4rem;font-family:'JetBrains Mono',monospace;letter-spacing:.04em}
.brand-line{display:flex;align-items:center;justify-content:center;gap:.6rem;margin-top:.75rem;flex-wrap:wrap}
.brand-tag{background:var(--bg3);border:1px solid var(--border);padding:.2rem .65rem;border-radius:100px;font-size:.7rem;color:var(--text-dim);font-family:'JetBrains Mono',monospace}

/* ---- TABS ---- */
.tab-bar{display:flex;gap:0;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{flex:none;padding:.85rem 1.4rem;font-size:.78rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--text-muted);background:transparent;border:none;cursor:pointer;position:relative;white-space:nowrap;transition:color .2s}
.tab-btn:hover{color:var(--text-dim)}
.tab-btn.active{color:var(--gold)}
.tab-btn.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--gold)}

.sub-tab-bar{display:flex;gap:.5rem;padding:.75rem 1.5rem;background:var(--bg2);border-bottom:1px solid var(--border)}
.sub-tab{padding:.4rem 1rem;font-size:.72rem;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);background:var(--bg3);border:1px solid var(--border);border-radius:6px;cursor:pointer;transition:all .2s}
.sub-tab:hover{border-color:var(--border-light);color:var(--text-dim)}
.sub-tab.active{background:var(--gold);color:var(--bg);border-color:var(--gold)}

/* ---- PROMPT CARD ---- */
.prompt-panel{display:none;padding:1.5rem}
.prompt-panel.visible{display:block}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;max-width:960px;margin:0 auto}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:.5rem}
.card-title{font-size:.95rem;font-weight:600;color:var(--text)}
.card-title .type-badge{display:inline-block;padding:.15rem .5rem;border-radius:4px;font-size:.65rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-left:.5rem;vertical-align:middle}
.type-assembled .type-badge{background:#c8956c22;color:var(--gold)}
.type-exploded .type-badge{background:#7d9bc222;color:var(--blue)}
.type-video .type-badge{background:#7dab8a22;color:var(--green)}
.copy-btn{display:flex;align-items:center;gap:.4rem;padding:.4rem .85rem;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text-dim);font-size:.72rem;font-weight:500;cursor:pointer;transition:all .15s;font-family:'Space Grotesk',sans-serif}
.copy-btn:hover{border-color:var(--gold);color:var(--gold)}
.copy-btn.copied{background:var(--gold);color:var(--bg);border-color:var(--gold)}
.copy-btn svg{width:14px;height:14px}

.prompt-body{padding:1.25rem;font-family:'JetBrains Mono',monospace;font-size:.8rem;line-height:1.75;color:var(--text);white-space:pre-wrap;word-break:break-word}

.meta-row{display:flex;flex-wrap:wrap;gap:.5rem;padding:.75rem 1.25rem;border-top:1px solid var(--border);background:var(--bg3)}
.meta-chip{display:flex;align-items:center;gap:.3rem;padding:.2rem .6rem;background:var(--bg);border:1px solid var(--border);border-radius:100px;font-size:.65rem;color:var(--text-dim);font-family:'JetBrains Mono',monospace}
.meta-chip .label{color:var(--text-muted)}
.meta-chip .value{color:var(--gold-bright)}

.negative-section{padding:1rem 1.25rem;border-top:1px solid var(--border)}
.neg-title{font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--red);margin-bottom:.4rem}
.neg-text{font-family:'JetBrains Mono',monospace;font-size:.72rem;line-height:1.6;color:var(--text-muted)}

/* ---- CONFETTI CANVAS ---- */
#confetti-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}

/* ---- FOOTER ---- */
.footer{text-align:center;padding:2rem 1.5rem;border-top:1px solid var(--border);margin-top:1rem}
.footer p{font-size:.72rem;color:var(--text-muted);font-family:'JetBrains Mono',monospace;letter-spacing:.03em}
.footer p span{color:var(--gold-dim)}

/* ---- RESPONSIVE ---- */
@media(max-width:700px){
  html{font-size:14px}
  .tab-btn{padding:.7rem 1rem;font-size:.72rem}
  .prompt-body{font-size:.75rem;padding:1rem}
  .card-header{padding:.8rem 1rem}
  .meta-row{padding:.6rem 1rem}
}
</style>

// ============================================================
// CONFETTI ENGINE (canvas-based, zero dependencies)
// ============================================================
const canvas = document.getElementById('confetti-canvas');
const ctx = canvas.getContext('2d');
let confettiParticles = [];
let animating = false;

function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight}
window.addEventListener('resize',resizeCanvas);
resizeCanvas();

function randomRange(a,b){return Math.random()*(b-a)+a}

function spawnConfetti(x,y){
  const colors=['#c8956c','#e0b08a','#a87450','#e8e4df','#7dab8a','#c26d6d','#7d9bc2'];
  for(let i=0;i<80;i++){
    confettiParticles.push({
      x,y,
      vx:randomRange(-8,8),
      vy:randomRange(-14,-4),
      w:randomRange(4,10),
      h:randomRange(3,6),
      color:colors[Math.floor(Math.random()*colors.length)],
      rotation:randomRange(0,Math.PI*2),
      rotSpeed:randomRange(-.15,.15),
      gravity:.35,
      life:1,
      decay:randomRange(.008,.018)
    });
  }
  if(!animating){animating=true;animateConfetti()}
}

function animateConfetti(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  confettiParticles.forEach(p=>{
    p.x+=p.vx;
    p.vy+=p.gravity;
    p.y+=p.vy;
    p.rotation+=p.rotSpeed;
    p.life-=p.decay;
    if(p.life<=0)return;
    ctx.save();
    ctx.translate(p.x,p.y);
    ctx.rotate(p.rotation);
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;
    ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
    ctx.restore();
  });
  confettiParticles=confettiParticles.filter(p=>p.life>0);
  if(confettiParticles.length>0){requestAnimationFrame(animateConfetti)}
  else{animating=false;ctx.clearRect(0,0,canvas.width,canvas.height)}
}

// ============================================================
// UI RENDERING
// ============================================================
const mainTabsEl = document.getElementById('mainTabs');
const subTabsEl = document.getElementById('subTabs');
const containerEl = document.getElementById('promptContainer');

let activeSet = 0;
let activeSub = 'assembled';

const subLabels = {assembled:'Assembled',exploded:'Exploded',video:'Video'};

function renderMainTabs(){
  mainTabsEl.innerHTML='';
  SETS.forEach((s,i)=>{
    const b=document.createElement('button');
    b.className='tab-btn'+(i===activeSet?' active':'');
    b.textContent=s.label;
    b.onclick=()=>{activeSet=i;activeSub='assembled';renderMainTabs();renderSubTabs();renderPrompt()};
    mainTabsEl.appendChild(b);
  });
}

function renderSubTabs(){
  subTabsEl.innerHTML='';
  ['assembled','exploded','video'].forEach(k=>{
    const b=document.createElement('button');
    b.className='sub-tab'+(k===activeSub?' active':'');
    b.textContent=subLabels[k];
    b.onclick=()=>{activeSub=k;renderSubTabs();renderPrompt()};
    subTabsEl.appendChild(b);
  });
}

function renderPrompt(){
  const data=SETS[activeSet].prompts[activeSub];
  const typeClass = activeSub==='assembled'?'type-assembled':activeSub==='exploded'?'type-exploded':'type-video';
  const badgeLabel = activeSub==='assembled'?'ASSEMBLED':activeSub==='exploded'?'EXPLODED':'VIDEO';

  containerEl.innerHTML=`
    <div class="prompt-panel visible">
      <div class="card">
        <div class="card-header ${typeClass}">
          <div class="card-title">${data.title}<span class="type-badge">${badgeLabel}</span></div>
          <button class="copy-btn" id="copyBtn" onclick="copyPrompt(this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
            Copy prompt
          </button>
        </div>
        <div class="prompt-body" id="promptText">${data.body}</div>
        <div class="meta-row">
          <div class="meta-chip"><span class="label">Aspect</span><span class="value">${data.aspect}</span></div>
          <div class="meta-chip"><span class="label">Models</span><span class="value">${data.models}</span></div>
          <div class="meta-chip"><span class="label">Tags</span><span class="value">${data.tags}</span></div>
        </div>
        <div class="negative-section">
          <div class="neg-title">Negative Prompt</div>
          <div class="neg-text">${data.negative}</div>
        </div>
      </div>
    </div>
  `;
}

function copyPrompt(btn){
  const text=document.getElementById('promptText').innerText;
  navigator.clipboard.writeText(text).then(()=>{
    btn.classList.add('copied');
    btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> Copied!';
    const rect=btn.getBoundingClientRect();
    spawnConfetti(rect.left+rect.width/2, rect.top+rect.height/2);
    setTimeout(()=>{
      btn.classList.remove('copied');
      btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copy prompt';
    },2000);
  });
}

renderMainTabs();
renderSubTabs();
renderPrompt();
</script>
